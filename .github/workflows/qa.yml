name: QA

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PHP_VERSION: '8.4'
  PROJECT_NAME: hivecache
  COMPOSE_ANSI: never

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: castor-php/setup-castor@v1.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Cache Builder Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/services/php/Dockerfile
          target: builder
          tags: ${{ env.PROJECT_NAME }}-builder:latest
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ env.PHP_VERSION }}
            PROJECT_NAME=${{ env.PROJECT_NAME }}

      - name: Debug - List Images
        run: docker images

      - name: Cache vendor directories
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: castor server:install

  cs:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: castor-php/setup-castor@v1.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Builder Image from Cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/services/php/Dockerfile
          target: builder
          tags: ${{ env.PROJECT_NAME }}-builder:latest
          load: true
          cache-from: type=gha

      - name: Debug - List Images
        run: docker images

      - name: Restore vendor cache
        uses: actions/cache/restore@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

      - name: Run PHP CS Fixer
        run: castor qa:cs --dry-run

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: castor-php/setup-castor@v1.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Builder Image from Cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/services/php/Dockerfile
          target: builder
          tags: ${{ env.PROJECT_NAME }}-builder:latest
          load: true
          cache-from: type=gha

      - name: Debug - List Images
        run: docker images

      - name: Restore vendor cache
        uses: actions/cache/restore@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('**/composer.lock') }}

      - name: Warm up Symfony cache
        run: castor console -- cache:warmup

      - name: Run PHPStan
        run: castor qa:phpstan

  phpunit:
    name: PHPUnit
    runs
