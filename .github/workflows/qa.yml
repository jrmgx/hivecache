name: QA

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]

env:
  PHP_VERSION: '8.4'
  PROJECT_NAME: hivecache
  COMPOSE_ANSI: never

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: castor-php/setup-castor@v1.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('infrastructure/docker/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build builder image
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg PHP_VERSION=${{ env.PHP_VERSION }} \
            --target builder \
            --load \
            -t hivecache-builder:ci \
            -f infrastructure/docker/services/php/Dockerfile .
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Cache builder image
        uses: actions/cache@v4
        with:
          path: /tmp/builder-image.tar
          key: ${{ runner.os }}-builder-image-${{ hashFiles('infrastructure/docker/**') }}-${{ env.PHP_VERSION }}

      - name: Save builder image
        run: docker save hivecache-builder:ci -o /tmp/builder-image.tar

      - name: Cache vendor directories
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('server/composer.lock', 'tools/php-cs-fixer/composer.lock', 'tools/phpstan/composer.lock', 'tools/twig-cs-fixer/composer.lock') }}

      - name: Install dependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: castor server:install

  cs:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: castor-php/setup-castor@v1.0.0

      - name: Restore builder image
        uses: actions/cache/restore@v4
        with:
          path: /tmp/builder-image.tar
          key: ${{ runner.os }}-builder-image-${{ hashFiles('infrastructure/docker/**') }}-${{ env.PHP_VERSION }}

      - name: Load builder image
        run: docker load -i /tmp/builder-image.tar

      - name: Restore vendor cache
        uses: actions/cache/restore@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('server/composer.lock', 'tools/php-cs-fixer/composer.lock', 'tools/phpstan/composer.lock', 'tools/twig-cs-fixer/composer.lock') }}

      - name: Run PHP CS Fixer
        run: castor qa:cs --dry-run

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: castor-php/setup-castor@v1.0.0

      - name: Restore builder image
        uses: actions/cache/restore@v4
        with:
          path: /tmp/builder-image.tar
          key: ${{ runner.os }}-builder-image-${{ hashFiles('infrastructure/docker/**') }}-${{ env.PHP_VERSION }}

      - name: Load builder image
        run: docker load -i /tmp/builder-image.tar

      - name: Restore vendor cache
        uses: actions/cache/restore@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('server/composer.lock', 'tools/php-cs-fixer/composer.lock', 'tools/phpstan/composer.lock', 'tools/twig-cs-fixer/composer.lock') }}

      - name: Warm up Symfony cache
        run: castor console -- cache:warmup

      - name: Run PHPStan
        run: castor qa:phpstan

  twig-cs:
    name: Twig CS Fixer
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: castor-php/setup-castor@v1.0.0

      - name: Restore builder image
        uses: actions/cache/restore@v4
        with:
          path: /tmp/builder-image.tar
          key: ${{ runner.os }}-builder-image-${{ hashFiles('infrastructure/docker/**') }}-${{ env.PHP_VERSION }}

      - name: Load builder image
        run: docker load -i /tmp/builder-image.tar

      - name: Restore vendor cache
        uses: actions/cache/restore@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('server/composer.lock', 'tools/php-cs-fixer/composer.lock', 'tools/phpstan/composer.lock', 'tools/twig-cs-fixer/composer.lock') }}

      - name: Run Twig CS Fixer
        run: castor qa:twig-cs --dry-run

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: castor-php/setup-castor@v1.0.0

      - name: Restore builder image
        uses: actions/cache/restore@v4
        with:
          path: /tmp/builder-image.tar
          key: ${{ runner.os }}-builder-image-${{ hashFiles('infrastructure/docker/**') }}-${{ env.PHP_VERSION }}

      - name: Load builder image
        run: docker load -i /tmp/builder-image.tar

      - name: Restore vendor cache
        uses: actions/cache/restore@v4
        with:
          path: |
            server/vendor
            tools/php-cs-fixer/vendor
            tools/phpstan/vendor
            tools/twig-cs-fixer/vendor
          key: ${{ runner.os }}-vendor-${{ hashFiles('server/composer.lock', 'tools/php-cs-fixer/composer.lock', 'tools/phpstan/composer.lock', 'tools/twig-cs-fixer/composer.lock') }}

      - name: Start postgres
        run: castor up --service postgres

      - name: Generate JWT keypair
        run: castor console -- lexik:jwt:generate-keypair --skip-if-exists

      - name: Run PHPUnit
        run: castor qa:phpunit
